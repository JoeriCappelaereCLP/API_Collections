opencollection: 1.0.0

info:
  name: API_Collections_SAP
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: basic
    username: "{{BasicAuth_Username}}"
    password: "{{BasicAuth_Password}}"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
