  url: "{{BaseUrl}}/sap/opu/odata/sap/API_CLFN_PRODUCT_SRV/A_ProductClassCharc?$top=&$skip=&$inlinecount=allpages&$filter=ClassInternalID eq '35' and CharcInternalID eq '112'&$expand=to_Valuation&$select=Product,to_Valuation"
  params:
    - name: $top
      value: ""
      type: query
    - name: $skip
      value: ""
      type: query
    - name: $inlinecount
      value: allpages
      type: query
    - name: $filter
      value: ClassInternalID eq '35' and CharcInternalID eq '112'
